substitutions:
  name: esp32-voice-assistant-01
  friendly_name: ESP32-Voice-Assistant-01
  device_description: ESP32 Voice Assistant Media Speaker
  api_key: ********************************
  ap_password: ReplaceMe
  ota_password: ReplaceMe
  i2s_lrclk_pin_out: GPIO10
  i2s_bclk_pin_out: GPIO9
  i2s_dout_pin_spk: GPIO8
  i2s_lrclk_pin_in: GPIO6
  i2s_bclk_pin_in: GPIO7
  i2s_din_pin_mic: GPIO4
  timezone: Europe/Amsterdam
  psramMode: octal
  voice_assist_idle_phase_id: "1"
  voice_assist_waiting_for_command_phase_id: "2"
  voice_assist_listening_for_command_phase_id: "3"
  voice_assist_thinking_phase_id: "4"
  voice_assist_replying_phase_id: "5"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  hidden_ssid: "false"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}
  min_version: 2025.5.0
  on_boot:
    priority: 375
    then:
      - script.execute: control_leds
      - delay: 1s
      - delay: 10min
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: control_leds

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

wifi:
  id: wifi_id
  fast_connect: ${hidden_ssid}
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  use_address: 192.168.66.19
  on_connect:
    - script.execute: control_leds
  on_disconnect:
    - script.execute: control_leds

network:
  enable_ipv6: true

logger:
  level: DEBUG
  logs:
    sensor: WARN

api:
  encryption:
    key: ********************************
  id: api_id
  on_client_connected:
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds

ota:
  - platform: esphome
    id: ota_esphome
    password: ${ota_password}

psram:
  mode: ${psramMode}
  speed: 80MHz

time:
  - platform: homeassistant
    id: ha_time
    timezone: ${timezone}

globals:
  - id: volume_changed
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}

  - id: is_timer_active
    type: bool
    restore_value: false
    initial_value: 'false'

switch:
  - platform: template
    id: mute_switch
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:volume-mute"
    name: Mute
    entity_category: config
    optimistic: True
    turn_on_action:
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(mute_switch_on_sound);
      - delay: 500ms
      - microphone.mute:        
      - media_player.volume_set: 0%
    turn_off_action:
      - media_player.volume_set: 50%
      - microphone.unmute:
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(mute_switch_off_sound);
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds

  - platform: template
    id: mic_mute_switch
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:microphone-off"
    name: "Mute microphone"
    entity_category: config
    optimistic: True
    turn_on_action:
      - microphone.mute:
    turn_off_action:
      - if:
          condition:
            switch.is_on: mute_switch
          then:
            - switch.turn_off: mute_switch
          else:
            - microphone.unmute:
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds

  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - micro_wake_word.disable_model: stop
      - script.execute: disable_repeat
      - if:
          condition:
            media_player.is_announcing:
          then:
            media_player.stop:
              announcement: true
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      - script.execute: control_leds
    on_turn_on:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      - micro_wake_word.enable_model: stop
      - script.execute: ring_timer
      - script.execute: control_leds
      - delay: 15min
      - switch.turn_off: timer_ringing

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: ws2812
    pin: ${led_pin}
    num_leds: 1
    name: "Status LED"
    id: status_led
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 10%
          max_brightness: 80%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 10%
          max_brightness: 80%

script:
  - id: control_leds
    then:
      - lambda: |
          if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected() || !id(api_id).is_connected()){
            id(control_leds_no_ha_connection_state).execute();
          } else if (id(volume_changed)) {
            id(show_volume).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(mute_switch).state) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(external_media_player).volume == 0.0f || id(external_media_player).is_muted()) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }
  
  - id: show_volume
    mode: restart
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 1.0
          blue: 0.0
          brightness: 80%
      - delay: 500ms
      - lambda: id(volume_changed) = false;
      - script.execute: control_leds

  - id: control_leds_init_state
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 1.0
          blue: 0.0
          brightness: 80%
          effect: "Fast Pulse"

  - id: control_leds_no_ha_connection_state
    then:
      - light.turn_on:
          id: status_led
          red: 1
          green: 1
          blue: 0
          brightness: 50%
          effect: Slow Pulse
  - id: control_leds_voice_assistant_idle_phase
    then:
      - light.turn_off: status_led

  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 0.0
          blue: 1.0
          brightness: 80%
          effect: "Slow Pulse"

  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 0.0
          blue: 1.0
          brightness: 80%
          effect: "Fast Pulse"

  - id: control_leds_voice_assistant_thinking_phase
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 0.0
          blue: 1.0
          brightness: 80%
          effect: "none"

  - id: control_leds_voice_assistant_replying_phase
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 0.0
          blue: 1.0
          brightness: 80%
          effect: "none"

  - id: control_leds_voice_assistant_error_phase
    then:
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 0.0
          blue: 0.0
          brightness: 80%
          effect: "Fast Pulse"

  - id: control_leds_muted_or_silent
    then:
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 0.0
          blue: 0.0
          brightness: 80%
          effect: "none"

  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 0.0
          blue: 0.0
          brightness: 80%
          effect: "Slow Pulse"

  - id: control_leds_timer_ringing
    then:
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
          effect: "Fast Pulse"

  - id: control_leds_timer_ticking
    then:
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 80%
          effect: "Slow Pulse"

  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(timer_finished_sound);

  - id: enable_repeat_one
    then:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 500);

  - id: disable_repeat
    then:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);

  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->play_file(sound_file, true, false);
          }

  - id: check_if_timers_active
    then:
      - lambda: |
          auto timers = id(va).get_timers();
          bool output = !timers.empty();
          id(is_timer_active) = output;

  - id: activate_stop_word_once
    then:
      - delay: 1s
      - if:
          condition:
            switch.is_off: timer_ringing
          then:
            - micro_wake_word.enable_model: stop
            - wait_until:
                not:
                  media_player.is_announcing:
            - if:
                condition:
                  switch.is_off: timer_ringing
                then:
                  - micro_wake_word.disable_model: stop

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin:
      number: $i2s_lrclk_pin_out
    i2s_bclk_pin:
      number: $i2s_bclk_pin_out

  - id: i2s_input
    i2s_lrclk_pin:
      number: $i2s_lrclk_pin_in
    i2s_bclk_pin:
      number: $i2s_bclk_pin_in

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: $i2s_din_pin_mic
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_audio_id: i2s_input
    channel: stereo

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_dout_pin: $i2s_dout_pin_spk
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: mono
    timeout: never
    buffer_duration: 100ms

  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 1
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

media_player:
  - platform: speaker
    id: external_media_player
    name: Media Player
    internal: False
    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    on_mute:
      - script.execute: control_leds
    on_unmute:
      - script.execute: control_leds
    on_volume:
      - lambda: id(volume_changed) = true;
      - script.execute: control_leds
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      - if:
          condition:
            and:
              - switch.is_off: timer_ringing
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 0
                duration: 1.0s
    files:
      - id: mute_switch_on_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
      - id: mute_switch_off_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      - id: error_cloud_expired
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3

micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    gain_factor: 4
  stop_after_detection: false
  models:
    - model: https://github.com/kahrendt/microWakeWord/releases/download/okay_nabu_20241226.3/okay_nabu.json
      id: okay_nabu
    - model: hey_jarvis
      id: hey_jarvis
    - model: hey_mycroft
      id: hey_mycroft
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
  vad:
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: mic_mute_switch
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                    else:
                      - if:
                          condition:
                            media_player.is_announcing:
                          then:
                            - media_player.stop:
                                announcement: true
                          else:
                            - if:
                                condition:
                                  switch.is_on: wake_sound
                                then:
                                  - script.execute:
                                      id: play_sound
                                      priority: true
                                      sound_file: !lambda return id(wake_word_triggered_sound);
                                  - delay: 300ms
                            - voice_assistant.start:
                                wake_word: !lambda return wake_word;

select:
  - platform: template
    name: "Wake word sensitivity"
    optimistic: true
    initial_option: Moderately sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      lambda: |-
        if (x == "Slightly sensitive") {
          id(okay_nabu).set_probability_cutoff(217);
          id(hey_jarvis).set_probability_cutoff(247);
          id(hey_mycroft).set_probability_cutoff(253);
        } else if (x == "Moderately sensitive") {
          id(okay_nabu).set_probability_cutoff(176);
          id(hey_jarvis).set_probability_cutoff(235);
          id(hey_mycroft).set_probability_cutoff(242);
        } else if (x == "Very sensitive") {
          id(okay_nabu).set_probability_cutoff(143);
          id(hey_jarvis).set_probability_cutoff(212);
          id(hey_mycroft).set_probability_cutoff(237);
        }

voice_assistant:
  id: va
  microphone:
    - microphone: i2s_mics
      channels: 0
    - microphone: i2s_mics
      channels: 1
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 15dBFS
  volume_multiplier: 1
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(error_cloud_expired);
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.0s
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_tts_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: control_leds
    - script.execute: activate_stop_word_once
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_timer_finished:
    - switch.turn_on: timer_ringing
  on_timer_started:
    - script.execute: control_leds
  on_timer_cancelled:
    - script.execute: control_leds
  on_timer_updated:
    - script.execute: control_leds


number:
  - platform: template
    id: night_switch_time
    name: "Night switch time"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 22
    restore_value: true
  - platform: template
    id: day_switch_time
    name: "Day switch time"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 7
    restore_value: true
  
  - platform: template
    name: "Noise Suppression Level"
    id: noise_suppression_level
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 4
    step: 1
    initial_value: 0
    restore_value: true
    on_value:
      then:
        - lambda: 'id(va).set_noise_suppression_level((int)x);'

  - platform: template
    name: "Auto Gain"
    id: auto_gain
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 31
    step: 1
    unit_of_measurement: "dBFS"
    initial_value: 0
    restore_value: true
    on_value:
      then:
        - lambda: 'id(va).set_auto_gain((int)x);'

  - platform: template
    name: "Volume Multiplier"
    id: volume_multiplier
    entity_category: config
    optimistic: true
